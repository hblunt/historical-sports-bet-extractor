name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name "SportsBetExtractor" sportsbet_extractor.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SportsBetExtractor-${{ matrix.os }}
          path: dist/SportsBetExtractor*
